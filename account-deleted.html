<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Deleted • Quickcheck</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0b;
      color: #ececee;
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #111216;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
    }

    .logo {
      color: #e0be78;
      font-size: 14px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 32px;
    }

    p {
      color: #a1a1aa;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      background: #e0be78;
      color: #111;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Quickcheck</div>

    <h1>Account Deleted</h1>

    <p>
      Your account and all associated data have been permanently removed.
    </p>

    <a class="btn" href="/auth/index.html">
      Create New Account
    </a>
  </div>

</body>
</html>
